<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Справочник игр — Creatives Catalog</title>
    <style>
/* ── Variables ───────────────────────────────────────────────────────────── */
:root {
    --bg-body: #f6f8fa;
    --bg-surface: #ffffff;
    --bg-elevated: #f0f2f5;
    --bg-input: #ffffff;
    --border: #d0d7de;
    --border-focus: #0969da;
    --text: #1f2328;
    --text-muted: #656d76;
    --text-dim: #8c959f;
    --accent: #0969da;
    --accent-hover: #0550ae;
    --green: #1a7f37;
    --yellow: #9a6700;
    --red: #cf222e;
    --purple: #8250df;
    --cyan: #1b7c83;
    --orange: #bc4c00;
    --radius: 8px;
    --radius-sm: 4px;
}

/* ── Reset ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg-body);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
}

a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }

/* ── Navbar ──────────────────────────────────────────────────────────────── */
.navbar {
    display: flex;
    align-items: center;
    gap: 2rem;
    padding: 0 2rem;
    height: 56px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 3px rgba(27,31,36,0.04);
    position: sticky;
    top: 0;
    z-index: 100;
}

.nav-brand {
    font-weight: 700;
    font-size: 1.1rem;
    color: var(--text);
    white-space: nowrap;
}

.nav-links { display: flex; gap: 0.25rem; }

.nav-links a {
    padding: 0.5rem 1rem;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-size: 0.9rem;
    transition: background 0.15s, color 0.15s;
}
.nav-links a:hover { background: var(--bg-elevated); color: var(--text); }
.nav-links a.active { background: var(--bg-elevated); color: var(--accent); }

/* ── Container ───────────────────────────────────────────────────────────── */
.container { max-width: 1280px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

/* ── Page header ─────────────────────────────────────────────────────────── */
.page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
}
.page-header h1 { font-size: 1.5rem; font-weight: 600; }

/* ── Flash messages ──────────────────────────────────────────────────────── */
.flash-container { padding: 0.75rem 2rem 0; max-width: 1280px; margin: 0 auto; }
.flash {
    padding: 0.75rem 1rem;
    border-radius: var(--radius-sm);
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
}
.flash-success { background: #dafbe1; border: 1px solid #aceebb; color: var(--green); }
.flash-error { background: #ffebe9; border: 1px solid #ffcecb; color: var(--red); }

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-elevated);
    color: var(--text);
    font-size: 0.875rem;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
}
.btn:hover { background: var(--bg-surface); border-color: var(--text-muted); }
.btn-primary { background: #2da44e; border-color: rgba(27,31,36,0.15); color: #fff; }
.btn-primary:hover { background: #2c974b; }
.btn-danger { border-color: rgba(207,34,46,0.3); color: var(--red); }
.btn-danger:hover { background: #ffebe9; }
.btn-sm { padding: 0.25rem 0.5rem; font-size: 0.8rem; }
.btn-lg { padding: 0.75rem 1.5rem; font-size: 1rem; width: 100%; }

/* ── Forms ────────────────────────────────────────────────────────────────── */
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.35rem; }
.form-group-btn { display: flex; align-items: flex-end; }

.form-row { display: flex; gap: 1rem; }
.form-row .form-group { flex: 1; }

input, select, textarea {
    width: 100%;
    padding: 0.5rem 0.75rem;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 0.9rem;
    transition: border-color 0.15s;
}
input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
}
textarea { resize: vertical; font-family: inherit; }

select { cursor: pointer; }

/* ── Filters ─────────────────────────────────────────────────────────────── */
.filters {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    margin-bottom: 1.5rem;
}
.filter-row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
.filter-row select { width: auto; min-width: 140px; flex: 0 1 auto; }
.search-box { display: flex; gap: 0.5rem; flex: 1; min-width: 200px; }
.search-box input { flex: 1; }

/* ── Cards grid ──────────────────────────────────────────────────────────── */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
}

.card {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.15s, box-shadow 0.15s;
}
.card:hover { border-color: #8c959f; box-shadow: 0 1px 4px rgba(27,31,36,0.08); }

.card-preview {
    position: relative;
    height: 180px;
    background: #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}
.card-preview img,
.card-preview video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}
.card-preview .file-icon {
    font-size: 2.5rem;
    font-weight: 700;
    color: var(--text-dim);
    background: var(--bg-elevated);
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius);
}
.play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: rgba(255,255,255,0.8);
    background: rgba(0,0,0,0.3);
    cursor: pointer;
    transition: background 0.15s;
}
.play-overlay:hover { background: rgba(0,0,0,0.5); }

.card-body { padding: 0.75rem 1rem 1rem; }

.card-name {
    font-size: 0.85rem;
    font-weight: 600;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    color: var(--accent);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    margin-bottom: 0.5rem;
}

.card-meta { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-bottom: 0.5rem; }

.card-info {
    display: flex;
    gap: 0.75rem;
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
}

.card-actions { display: flex; gap: 0.5rem; align-items: center; }

/* ── Badges ──────────────────────────────────────────────────────────────── */
.badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 12px;
    font-size: 0.75rem;
    font-weight: 500;
}

.badge-type-video { background: #ddf4ff; color: var(--accent); }
.badge-type-banner { background: #fff1e5; color: var(--orange); }
.badge-type-playable { background: #fbefff; color: var(--purple); }
/* ── Tag badges ──────────────────────────────────────────────────────────── */
.tags-cell { white-space: nowrap; }

.badge-tag {
    display: inline-block;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
    margin: 1px;
    background: var(--bg-elevated);
    color: var(--text-dim);
    border: 1px solid var(--border);
    transition: all 0.15s;
    user-select: none;
}
.badge-tag:hover { border-color: var(--text-muted); }
.badge-tag-on {
    background: #fff8c5;
    color: var(--yellow);
    border-color: #e4d191;
}

/* ── Status select ───────────────────────────────────────────────────────── */
.status-select {
    width: auto;
    padding: 0.2rem 0.5rem;
    font-size: 0.8rem;
    border-radius: 12px;
    cursor: pointer;
}
.status-draft { background: #f6f8fa; border-color: #d0d7de; color: var(--text-muted); }
.status-ready { background: #ddf4ff; border-color: #b6e3ff; color: var(--accent); }
.status-active { background: #dafbe1; border-color: #aceebb; color: var(--green); }
.status-archived { background: #f6f8fa; border-color: #d0d7de; color: var(--text-dim); }

/* ── Create page layout ─────────────────────────────────────────────────── */
.create-simple { max-width: 640px; }

.create-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: start;
}

/* ── File upload ─────────────────────────────────────────────────────────── */
.file-drop {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
}
.file-drop:hover,
.file-drop.dragover { border-color: var(--accent); background: rgba(88,166,255,0.05); }
.file-drop input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
}
.file-drop p { color: var(--text-muted); margin-bottom: 0.35rem; }
.file-drop-hint { font-size: 0.8rem; color: var(--text-dim); }
.file-drop.has-file { border-style: solid; border-color: var(--green); }
.file-drop.has-file p { color: var(--green); }

/* ── Preview panel ───────────────────────────────────────────────────────── */
.preview-panel {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    position: sticky;
    top: 72px;
}
.preview-panel h3 { font-size: 1rem; margin-bottom: 1rem; color: var(--text-muted); }

.file-preview-area {
    min-height: 200px;
    background: #f0f2f5;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 1rem;
}
.file-preview-area img,
.file-preview-area video {
    max-width: 100%;
    max-height: 300px;
    object-fit: contain;
}
.placeholder-text { color: var(--text-dim); font-size: 0.9rem; }

.name-preview {
    background: var(--bg-body);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.75rem 1rem;
    margin-bottom: 0.75rem;
}
.name-preview label { font-size: 0.8rem; color: var(--text-muted); display: block; margin-bottom: 0.35rem; }
.name-preview code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--accent);
    font-size: 0.95rem;
    word-break: break-all;
}

.seq-info {
    font-size: 0.85rem;
    color: var(--text-muted);
    padding: 0.5rem 0;
}
.seq-info strong { color: var(--text); }

/* ── Data table ──────────────────────────────────────────────────────────── */
.data-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 1.5rem;
}
.data-table th {
    text-align: left;
    padding: 0.6rem 0.75rem;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.data-table td {
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
}
.data-table tr:hover td { background: var(--bg-elevated); }

.inline-input {
    background: transparent;
    border: 1px solid transparent;
    padding: 0.3rem 0.5rem;
    border-radius: var(--radius-sm);
}
.inline-input:focus { background: var(--bg-input); border-color: var(--border-focus); }

.actions-cell { white-space: nowrap; display: flex; gap: 0.35rem; }

/* ── Tree ────────────────────────────────────────────────────────────────── */
.tree { margin-top: 0.5rem; }

.tree-node { margin-bottom: 2px; }

.tree-header {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 0.75rem;
    border-radius: var(--radius-sm);
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
}
.tree-header:hover { background: var(--bg-elevated); }

.tree-level-0 {
    font-size: 1rem;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    margin-bottom: 4px;
}
.tree-level-1 {
    font-size: 0.9rem;
    padding-left: 1.5rem;
}

.tree-arrow {
    display: inline-block;
    font-size: 0.7rem;
    color: var(--text-muted);
    transition: transform 0.15s;
    width: 12px;
    text-align: center;
}
.tree-header.open > .tree-arrow { transform: rotate(90deg); }

.btn-add { margin-left: 0.5rem; }

.tree-count {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--text-dim);
    background: var(--bg-elevated);
    padding: 0.1rem 0.5rem;
    border-radius: 10px;
}

.tree-children { padding-left: 1rem; }
.tree-level-0 + .tree-children { padding-left: 0.5rem; padding-top: 4px; }

/* ── Renditions (expandable file list) ────────────────────────────────────── */
.files-toggle {
    cursor: pointer;
    color: var(--accent);
    font-size: 0.85rem;
    user-select: none;
}
.files-toggle:hover { text-decoration: underline; }

.files-arrow {
    display: inline-block;
    font-size: 0.65rem;
    transition: transform 0.15s;
    margin-left: 0.25rem;
}
.files-toggle.open .files-arrow { transform: rotate(90deg); }

.renditions-row td { padding: 0 !important; border-bottom: 1px solid var(--border); }

.renditions-cell { padding: 0 0 0 2rem !important; }

.renditions-list {
    padding: 0.5rem 0.75rem;
    background: var(--bg-elevated);
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
}

.rendition-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.4rem 0.5rem;
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
}
.rendition-item:hover { background: var(--bg-surface); }
.rendition-item code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: var(--text);
    font-size: 0.8rem;
}
.rendition-item .btn { margin-left: auto; }

/* ── Network badges ───────────────────────────────────────────────────────── */
.networks-cell { white-space: nowrap; }

.badge-net {
    display: inline-block;
    padding: 0.15rem 0.4rem;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
    margin: 1px;
    background: var(--bg-elevated);
    color: var(--text-dim);
    border: 1px solid var(--border);
    transition: all 0.15s;
    user-select: none;
}
.badge-net:hover { border-color: var(--text-muted); }
.badge-net-on {
    background: #ddf4ff;
    color: var(--accent);
    border-color: #b6e3ff;
}

.text-dim { color: var(--text-dim); }

/* ── Catalog list ────────────────────────────────────────────────────────── */
.catalog-table { margin-top: 0; }
.catalog-table td { font-size: 0.9rem; }

.list-preview {
    width: 64px;
    height: 44px;
    overflow: hidden;
    border-radius: var(--radius-sm);
    background: var(--bg-elevated);
}
.list-preview img,
.list-preview video {
    width: 64px;
    height: 44px;
    object-fit: cover;
    display: block;
    border-radius: var(--radius-sm);
}
.file-icon-sm {
    width: 64px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 1rem;
    color: var(--text-dim);
}

.creative-name {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.85rem;
    color: var(--accent);
}

.text-muted { color: var(--text-muted); font-size: 0.85rem; }

/* ── Game add form ───────────────────────────────────────────────────────── */
.game-add-form {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
}
.game-add-form h3 { font-size: 1rem; margin-bottom: 1rem; color: var(--text-muted); }

/* ── Empty state ─────────────────────────────────────────────────────────── */
.empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
}
.empty-state p { margin-bottom: 1rem; font-size: 1.1rem; }

/* ── Modal ───────────────────────────────────────────────────────────────── */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
}
.modal {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: 560px;
    max-width: 90vw;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
}
.modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
}
.modal-header h3 { font-size: 1.1rem; font-weight: 600; }
.modal .name-preview { margin-bottom: 1rem; }

/* ── Responsive ──────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
    .create-layout { grid-template-columns: 1fr; }
    .filter-row { flex-direction: column; }
    .filter-row select { width: 100%; }
    .form-row { flex-direction: column; gap: 0; }
    .container { padding: 1rem; }
}

</style>
