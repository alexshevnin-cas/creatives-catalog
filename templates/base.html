<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Creatives Catalog{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><img src="{{ url_for('static', filename='logo.png') }}" alt="" style="height:28px;vertical-align:middle;margin-right:8px;">Creatives Catalog</div>
        <div class="nav-links">
            <a href="{{ url_for('catalog') }}" class="{% if request.endpoint == 'catalog' %}active{% endif %}">Каталог</a>
            <a href="{{ url_for('create') }}" class="{% if request.endpoint == 'create' %}active{% endif %}">Добавить</a>
            <a href="{{ url_for('games') }}" class="{% if request.endpoint == 'games' %}active{% endif %}">Игры</a>
        </div>
    </nav>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-container">
        {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}">{{ msg }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
